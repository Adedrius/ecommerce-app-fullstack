services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    image: ecommerce-backend:latest
    container_name: ecommerce-backend

    env_file:
      - ./backend/.env

    ports:
      - "127.0.0.1:4000:4000"

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s