name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

  workflow_dispatch:

concurrency:
  group: backend-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Configure SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -4 -T 15 -H "$EC2_HOST" 2>/dev/null >> ~/.ssh/known_hosts

      - name: Deploy backend
        shell: bash
        run: |
          ssh \
            -i ~/.ssh/ec2_key.pem \
            -o IdentitiesOnly=yes \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'EOF'
              set -e

              export NVM_DIR="$HOME/.nvm"
              source "$NVM_DIR/nvm.sh"
              nvm use 22

              cd "$HOME/ecommerce-app-fullstack"

              git fetch origin main
              git reset --hard origin/main

              cd backend
              npm ci --omit=dev

              pm2 restart ecommerce-backend --update-env
              pm2 save

              sleep 3
              curl --fail --silent http://127.0.0.1:4000/api/product/list > /dev/null

              echo "Backend deployment successful."
          EOF
